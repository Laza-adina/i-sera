<body>

    <!-- NAVBAR FIXE -->

        <span></span>

            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- SECTION CONTACT -->
    <main class="contact-container">
        
        <!-- Informations et Réseaux Sociaux -->
        <div class="contact-info fade-up">
            <h1>Contactez-nous</h1>
            <p>Une question sur une location ? Un projet d'achat ? Discutons de votre passion et trouvons le véhicule d'occasion qu'il vous faut.</p>
            
            <div class="social-links">
                <!-- Remplace par tes vrais liens -->
                <a href="https://wa.me/VOTRE_NUMERO" target="_blank" class="social-btn">WhatsApp</a>
                <a href="https://facebook.com/VOTRE_PAGE" target="_blank" class="social-btn">Facebook</a>
            </div>
        </div>

        <!-- Formulaire de Contact -->
        <div class="contact-form-wrapper fade-up" style="transition-delay: 0.2s;">
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Nom / Prénom</label>
                    <input type="text" id="name" name="user_name" placeholder="Entrez votre nom" required>
                </div>
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" name="user_email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Votre Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
                </div>
                <button type="submit" class="btn">Envoyer le message</button>
            </form>
        </div>

    </main>

    <!-- FOOTER STANDARD -->
    <footer class="footer">
        <div>&copy; 2026 I-Sera Madagascar. Tous droits réservés.</div>
        <div>
            <a href="#">CGU</a>
            <a href="#">Mentions Légales</a>

        </div>
    </footer>
